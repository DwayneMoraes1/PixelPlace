<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PixelPlace - Multiplayer Pixel Art</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f19;
        --panel: #121a2a;
        --text: #e6e9f2;
        --muted: #a6afc3;
        --border: rgba(255, 255, 255, 0.12);
        --accent: #6aa9ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans",
          "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 30% 10%, #182546 0%, var(--bg) 60%);
        color: var(--text);
      }
      .wrap {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        padding: 16px;
        max-width: 1400px;
        margin: 0 auto;
      }
      .card {
        background: color-mix(in srgb, var(--panel) 92%, black);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 8px; font-size: 18px; letter-spacing: 0.2px; }
      .muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
      .row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
      .row:first-of-type { margin-top: 0; }
      button {
        background: var(--accent);
        color: var(--bg);
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover { filter: brightness(1.1); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #board {
        width: 800px;
        height: 800px;
        image-rendering: pixelated;
        cursor: crosshair;
        border-radius: 8px;
        background: #fff;
      }
      .palette { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
      .swatch {
        width: 100%;
        aspect-ratio: 1;
        border: 2px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .swatch:hover { transform: scale(1.1); }
      .swatch.selected { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
      #log {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        height: 120px;
        overflow-y: auto;
        background: #000;
        border-radius: 6px;
        padding: 8px;
        color: #8f9;
      }
      #status { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
      #status.ok { background: rgba(0, 200, 100, 0.2); color: #4f8; }
      #status.bad { background: rgba(255, 50, 50, 0.2); color: #f84; }
      #cooldown { font-variant-numeric: tabular-nums; }
      #userId { font-family: monospace; font-size: 12px; color: var(--muted); }
      .room-input {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 14px;
        width: 100%;
      }
      .users-list {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .user-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="left">
        <div class="card">
          <h1>PixelPlace</h1>
          <p class="muted">Collaborative pixel art. Share the room name with friends!</p>
          
          <div class="row">
            <input type="text" id="roomName" class="room-input" placeholder="Room name..." value="pixelplace-demo">
            <button id="joinBtn">Join</button>
          </div>
          
          <div class="row">
            <span id="status" class="bad">Disconnected</span>
          </div>
          
          <div class="row">
            <span class="muted">Your ID:</span>
            <span id="userId">...</span>
          </div>
          
          <div class="row">
            <span class="muted">Color:</span>
            <span id="selectedColor">#ff4500</span>
          </div>
          
          <div class="row">
            <button id="randomBtn">Random Color</button>
          </div>
          
          <div class="row">
            <span class="muted">Cooldown:</span>
            <span id="cooldown">0s</span>
          </div>
        </div>
        
        <div class="card" style="margin-top: 16px;">
          <h1>Color Palette</h1>
          <div class="palette" id="palette"></div>
        </div>
        
        <div class="card" style="margin-top: 16px;">
          <h1>Activity Log</h1>
          <div id="log"></div>
        </div>
      </div>
      
      <div class="right">
        <div class="card" style="position: relative; padding: 0; overflow: hidden;">
          <canvas id="board" width="200" height="200"></canvas>
        </div>
      </div>
    </div>

    <script type="module">
      const el = (id) => document.getElementById(id);
      const statusEl = el('status');
      const cooldownEl = el('cooldown');
      const selectedColorEl = el('selectedColor');
      const userIdEl = el('userId');
      const logEl = el('log');
      const paletteEl = el('palette');
      const randomBtn = el('randomBtn');
      const joinBtn = el('joinBtn');
      const roomNameInput = el('roomName');

      const canvas = el('board');
      const ctx = canvas.getContext('2d', { alpha: false });

      let boardWidth = 200;
      let boardHeight = 200;
      let cooldownMs = 2000;
      let cooldownUntil = 0;
      let boardData = new Uint8ClampedArray(boardWidth * boardHeight * 4).fill(255);

      let userId = Math.random().toString(36).slice(2, 10);
      let userColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
      let room = null;
      let sendPixel, sendCursor;
      let peers = new Map();
      let activePeer = null;
      let isHost = false;
      let currentRoomName = '';

      const palette = [
        '#6D001A', '#BE0039', '#FF4500', '#FFA800', '#FFD635', '#FFF8B8',
        '#00A368', '#00CC78', '#7EED56', '#00756F', '#009EAA', '#00CCC0',
        '#2450A4', '#3690EA', '#51E9F4', '#493AC1', '#6A5CFF', '#94B3FF',
        '#811E9F', '#B44AC0', '#E4ABFF', '#DE107F', '#FF3881', '#FF99AA',
        '#6D482F', '#9C6926', '#FFB470', '#000000', '#515252', '#898D90',
        '#D4D7D9', '#FFFFFF'
      ];

      let selectedColor = palette[2];

      function log(line) {
        const t = new Date().toISOString().slice(11, 19);
        const div = document.createElement('div');
        div.textContent = `[${t}] ${line}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(ok, text) {
        statusEl.textContent = text;
        statusEl.classList.toggle('ok', ok);
        statusEl.classList.toggle('bad', !ok);
      }

      function setSelectedColor(c) {
        selectedColor = c;
        selectedColorEl.textContent = c;
        for (const btn of paletteEl.querySelectorAll('button[data-color]')) {
          btn.classList.toggle('selected', btn.dataset.color === c);
        }
      }

      function renderPalette() {
        paletteEl.innerHTML = '';
        for (const c of palette) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'swatch';
          btn.style.background = c;
          btn.dataset.color = c;
          btn.title = c;
          btn.addEventListener('click', () => setSelectedColor(c));
          paletteEl.appendChild(btn);
        }
        setSelectedColor(selectedColor);
      }

      function resizeCanvasToBoard() {
        ctx.imageSmoothingEnabled = false;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, boardWidth, boardHeight);
        ctx.scale(4, 4);
      }

      function drawPixel(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
        
        // Store in board data
        const idx = (y * boardWidth + x) * 4;
        const rgb = hexToRgb(color);
        if (rgb) {
          boardData[idx] = rgb.r;
          boardData[idx+1] = rgb.g;
          boardData[idx+2] = rgb.b;
          boardData[idx+3] = 255;
        }
      }
      
      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
          r: parseInt(result[1], 16),
          g: parseInt(result[2], 16),
          b: parseInt(result[3], 16)
        } : null;
      }

      function getBoardPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = boardWidth / rect.width;
        const scaleY = boardHeight / rect.height;
        return {
          x: Math.floor((e.clientX - rect.left) * scaleX),
          y: Math.floor((e.clientY - rect.top) * scaleY)
        };
      }

      // Initialize
      resizeCanvasToBoard();
      renderPalette();
      userIdEl.textContent = userId;

      // Handle canvas clicks
      canvas.addEventListener('click', async (e) => {
        if (!room) {
          log('Join a room first!');
          return;
        }
        
        const now = Date.now();
        if (now < cooldownUntil) {
          const remaining = Math.ceil((cooldownUntil - now) / 1000);
          log(`Wait ${remaining}s before placing`);
          return;
        }

        const { x, y } = getBoardPos(e);
        if (x < 0 || x >= boardWidth || y < 0 || y >= boardHeight) return;

        drawPixel(x, y, selectedColor);
        cooldownUntil = now + cooldownMs;
        
        if (sendPixel) {
          sendPixel({ x, y, color: selectedColor, user: userId });
        }
      });

      // Random color button
      randomBtn.addEventListener('click', () => {
        const c = palette[Math.floor(Math.random() * palette.length)];
        setSelectedColor(c);
      });

      function resetConnectionState(statusText = 'Disconnected') {
        room = null;
        peers.forEach((conn) => {
          try { conn.close(); } catch {}
        });
        peers.clear();
        if (activePeer && !activePeer.destroyed) {
          try { activePeer.destroy(); } catch {}
        }
        activePeer = null;
        isHost = false;
        currentRoomName = '';
        setStatus(false, statusText);
        joinBtn.disabled = false;
        joinBtn.textContent = 'Join';
      }

      function serializeBoard() {
        const pixels = [];
        for (let y = 0; y < boardHeight; y++) {
          for (let x = 0; x < boardWidth; x++) {
            const idx = (y * boardWidth + x) * 4;
            const r = boardData[idx];
            const g = boardData[idx + 1];
            const b = boardData[idx + 2];
            if (r === 255 && g === 255 && b === 255) continue;
            pixels.push({ x, y, color: '#' + [r, g, b].map((v) => v.toString(16).padStart(2, '0')).join('') });
          }
        }
        return pixels;
      }

      function applyBoardSnapshot(pixels) {
        resizeCanvasToBoard();
        boardData.fill(255);
        for (const pixel of pixels || []) {
          drawPixel(pixel.x, pixel.y, pixel.color);
        }
      }

      function setupConnection(conn) {
        conn.on('open', () => {
          const peerDisplay = conn.peer.replace('pixelplace-', '');
          log(`Connected to: ${peerDisplay}`);
          peers.set(conn.peer, conn);
          room = currentRoomName || true;
          setStatus(true, 'Connected');
          joinBtn.disabled = false;
          joinBtn.textContent = isHost ? 'Hosting' : 'Joined!';

          if (isHost) {
            conn.send({ type: 'board-sync', pixels: serializeBoard() });
          }
        });

        conn.on('data', (data) => {
          if (!data || typeof data !== 'object') return;

          if (data.type === 'pixel' && data.user !== userId) {
            drawPixel(data.x, data.y, data.color);
            if (isHost) {
              peers.forEach((peerConn, peerId) => {
                if (peerId !== conn.peer && peerConn.open) {
                  peerConn.send(data);
                }
              });
            }
          }

          if (data.type === 'board-sync' && Array.isArray(data.pixels)) {
            applyBoardSnapshot(data.pixels);
            log(`Loaded ${data.pixels.length} pixels from room`);
          }
        });

        conn.on('close', () => {
          log(`Disconnected: ${conn.peer.replace('pixelplace-', '')}`);
          peers.delete(conn.peer);
          if (!isHost && peers.size === 0) {
            resetConnectionState('Disconnected');
          }
        });

        conn.on('error', (err) => {
          log('Connection error: ' + (err?.message || err));
          peers.delete(conn.peer);
          if (!isHost) {
            resetConnectionState('Failed');
          }
        });
      }

      // Join room button
      joinBtn.addEventListener('click', async () => {
        const roomName = roomNameInput.value.trim();
        if (!roomName) {
          log('Please enter a room name');
          return;
        }

        if (activePeer || room) {
          resetConnectionState('Disconnected');
        }

        joinBtn.disabled = true;
        joinBtn.textContent = 'Connecting...';
        setStatus(false, 'Connecting...');
        currentRoomName = roomName;

        try {
          // Use PeerJS for P2P connections
          const PeerJS = await import('https://cdn.jsdelivr.net/npm/peerjs@1.5.4/+esm');
          const Peer = PeerJS.default || PeerJS.Peer;

          // Create peer - first user gets this ID, others will get error and connect
          const peerId = 'pixelplace-' + roomName;
          const peer = new Peer(peerId, {
            debug: 1
          });
          activePeer = peer;

          peer.on('open', () => {
            isHost = true;
            log('Connected to signaling server as room host');
            setStatus(false, 'Waiting for peer');
            joinBtn.disabled = false;
            joinBtn.textContent = 'Hosting';
            room = roomName;

            // Listen for incoming connections from other users
            peer.on('connection', (conn) => {
              setupConnection(conn);
            });

            log('Waiting for others...');
          });

          peer.on('error', (err) => {
            log('Peer error: ' + err.type);

            // If host ID taken, create new peer to connect to host
            if (err.type === 'unavailable-id') {
              isHost = false;
              try { peer.destroy(); } catch {}
              const newPeer = new Peer(null, { debug: 1 });
              activePeer = newPeer;
              log('Host exists, connecting...');

              newPeer.on('open', () => {
                log('Connected to signaling server as guest');
                const conn = newPeer.connect(peerId, { reliable: true });
                setupConnection(conn);
              });

              newPeer.on('error', (guestErr) => {
                log('Guest peer error: ' + guestErr.type);
                resetConnectionState('Failed');
              });
            } else {
              resetConnectionState('Failed');
            }
          });

          peer.on('disconnected', () => {
            log('Lost signaling server connection');
            if (!isHost) {
              resetConnectionState('Disconnected');
            }
          });

          peer.on('close', () => {
            log('Peer closed');
            if (!isHost) {
              resetConnectionState('Disconnected');
            }
          });

          // Override sendPixel to use all connections
          sendPixel = (data) => {
            const msg = { type: 'pixel', x: data.x, y: data.y, color: data.color, user: userId };
            peers.forEach((conn) => {
              if (conn.open) {
                conn.send(msg);
              }
            });
          };

        } catch (err) {
          log('Connection failed: ' + err.message);
          resetConnectionState('Failed');
        }
      });

      // Cooldown display
      setInterval(() => {
        const remaining = Math.max(0, cooldownUntil - Date.now());
        cooldownEl.textContent = (remaining / 1000).toFixed(1) + 's';
      }, 100);
    </script>
  </body>
</html>
