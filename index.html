<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PixelPlace - Multiplayer Pixel Art</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #0a0a0b;
        --panel-2: #090909;
        --frame: #111214;
        --border: #232427;
        --border-soft: #17181b;
        --text: #f2f0e8;
        --muted: #6f675f;
        --dim: #867d73;
        --accent: #ff5a12;
        --accent-2: #ff6a1c;
        --canvas: #e7e7e7;
      }

      * { box-sizing: border-box; }

      html, body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SFMono-Regular", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        background:
          radial-gradient(circle at top left, rgba(255,255,255,0.02), transparent 28%),
          linear-gradient(180deg, #020202 0%, #030303 100%);
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .wrap {
        max-width: 1540px;
        margin: 0 auto;
        padding: 10px 12px 14px;
        display: grid;
        grid-template-columns: 306px 1fr;
        gap: 16px;
      }

      .left {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card {
        background: linear-gradient(180deg, rgba(11,11,12,0.98), rgba(7,7,8,0.98));
        border: 1px solid var(--border);
        box-shadow:
          inset 0 0 0 1px rgba(255,255,255,0.02),
          0 0 0 1px rgba(0,0,0,0.35);
        padding: 14px 14px 15px;
      }

      .brand {
        padding-top: 16px;
        padding-bottom: 14px;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #f7f1e7;
        font-weight: 700;
      }

      .brand .muted {
        margin-top: 10px;
      }

      .muted {
        color: var(--dim);
        font-size: 12px;
        line-height: 1.3;
      }

      .room-row {
        display: grid;
        grid-template-columns: 1fr 58px;
        gap: 8px;
        margin-top: 16px;
        margin-bottom: 18px;
      }

      .room-input {
        width: 100%;
        height: 32px;
        background: #060606;
        border: 1px solid #242424;
        color: #fbf7ef;
        outline: none;
        padding: 0 12px;
        border-radius: 0;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
      }

      .room-input::placeholder { color: #8c8379; }

      button {
        appearance: none;
        border: 0;
        border-radius: 0;
        background: var(--accent);
        color: #fffdf7;
        font: inherit;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: filter 0.12s ease, transform 0.02s ease;
      }

      button:hover { filter: brightness(1.08); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }

      #joinBtn {
        height: 32px;
        font-size: 13px;
      }

      .stats {
        display: grid;
        grid-template-columns: 72px 1fr;
        row-gap: 16px;
        column-gap: 12px;
        align-items: center;
        margin-top: 6px;
        margin-bottom: 12px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .value {
        font-size: 13px;
        color: #e8e1d6;
        font-weight: 700;
      }

      #status {
        display: inline-block;
        background: transparent;
        border: none;
        border-radius: 0;
        padding: 0;
        font: inherit;
        font-size: 13px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      #status.ok { color: #57d66c; }
      #status.bad { color: #ff3a22; }

      .color-value {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .color-chip {
        width: 22px;
        height: 22px;
        background: var(--accent);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      }

      #selectedColor {
        color: #fff7e9;
        font-size: 12px;
        font-weight: 800;
      }

      #userId {
        font-size: 12px;
        color: #7a7268;
        font-weight: 500;
      }

      #randomBtn {
        height: 34px;
        padding: 0 16px;
        font-size: 12px;
        min-width: 88px;
        margin-bottom: 10px;
      }

      .wait-row {
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
      }

      #cooldown {
        font-size: 14px;
        color: #faf6ef;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      .footer-stats {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #17181a;
        color: #a2988b;
        font-size: 12px;
        display: flex;
        gap: 16px;
      }

      .section-title {
        color: #7f776d;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.08em;
        margin: 0 0 14px;
      }

      .palette-wrap {
        overflow: hidden;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(8, 34px);
        grid-auto-rows: 34px;
        gap: 1px;
        width: fit-content;
        background: #161616;
        border: 1px solid #242424;
      }

      .swatch {
        width: 34px;
        height: 34px;
        border: none;
        padding: 0;
        outline: none;
        position: relative;
      }

      .swatch.selected::after {
        content: "";
        position: absolute;
        inset: 0;
        border: 2px solid #e7dfd1;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
      }

      .palette-scrollbar {
        height: 19px;
        display: flex;
        align-items: center;
        gap: 6px;
        background: #f1efea;
        border: 1px solid #bbb4aa;
        border-top: none;
        padding: 0 6px;
        width: fit-content;
        min-width: calc(34px * 8 + 7px);
      }

      .scroll-arrow {
        width: 0;
        height: 0;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
      }

      .scroll-arrow.left { border-right: 6px solid #888176; }
      .scroll-arrow.right { border-left: 6px solid #888176; }

      .scroll-track {
        flex: 1;
        height: 10px;
        background: #d4d0c7;
        border-radius: 999px;
        position: relative;
      }

      .scroll-thumb {
        position: absolute;
        left: 7%;
        top: 1px;
        height: 8px;
        width: 44%;
        background: #7d7d7d;
        border-radius: 999px;
      }

      #log {
        height: 110px;
        background: #000;
        border: 1px solid #151515;
        color: #8ab78f;
        font-size: 11px;
        line-height: 1.45;
        padding: 8px;
        overflow-y: auto;
        white-space: pre-wrap;
      }

      .right {
        min-width: 0;
      }

      .board-shell {
        min-height: calc(100vh - 24px);
        background: linear-gradient(180deg, #090909 0%, #070707 100%);
        border: 1px solid var(--border);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.025);
        display: grid;
        place-items: center;
        padding: 48px;
      }

      .canvas-frame {
        width: min(100%, 764px);
        aspect-ratio: 1 / 1;
        background: var(--canvas);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
        display: grid;
        place-items: stretch;
      }

      #board {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        cursor: crosshair;
        background: var(--canvas);
      }

      @media (max-width: 1200px) {
        .wrap {
          grid-template-columns: 306px minmax(0, 1fr);
        }
        .board-shell {
          padding: 28px;
        }
      }

      @media (max-width: 900px) {
        .wrap {
          grid-template-columns: 1fr;
        }
        .board-shell {
          min-height: auto;
        }
        .canvas-frame {
          width: 100%;
          max-width: 760px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="left">
        <div class="card brand">
          <h1>PIXELPLACE</h1>
          <div class="muted">Collaborative pixel canvas</div>

          <div class="room-row">
            <input type="text" id="roomName" class="room-input" placeholder="main" value="main">
            <button id="joinBtn">JOIN</button>
          </div>

          <div class="stats">
            <div class="label">STATUS</div>
            <div class="value"><span id="status" class="bad">OFFLINE</span></div>

            <div class="label">ID</div>
            <div class="value"><span id="userId">...</span></div>

            <div class="label">COLOR</div>
            <div class="value color-value">
              <span class="color-chip" id="colorChip"></span>
              <span id="selectedColor">#FF4500</span>
            </div>
          </div>

          <button id="randomBtn">RANDOM</button>

          <div class="wait-row">
            <div class="label">WAIT</div>
            <div class="value"><span id="cooldown">0.0s</span></div>
          </div>

          <div class="footer-stats">
            <span>Pixels: <strong id="pixelCount">0</strong></span>
            <span>Users: <strong id="userCount">0</strong></span>
          </div>
        </div>

        <div class="card palette-wrap">
          <div class="section-title">PALETTE</div>
          <div class="palette" id="palette"></div>
          <div class="palette-scrollbar" aria-hidden="true">
            <span class="scroll-arrow left"></span>
            <div class="scroll-track"><span class="scroll-thumb"></span></div>
            <span class="scroll-arrow right"></span>
          </div>
        </div>

        <div class="card">
          <div class="section-title">LOG</div>
          <div id="log"></div>
        </div>
      </div>

      <div class="right">
        <div class="board-shell">
          <div class="canvas-frame">
            <canvas id="board" width="800" height="800"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      const el = (id) => document.getElementById(id);
      const statusEl = el('status');
      const cooldownEl = el('cooldown');
      const selectedColorEl = el('selectedColor');
      const colorChipEl = el('colorChip');
      const userIdEl = el('userId');
      const logEl = el('log');
      const paletteEl = el('palette');
      const randomBtn = el('randomBtn');
      const joinBtn = el('joinBtn');
      const roomNameInput = el('roomName');
      const pixelCountEl = el('pixelCount');
      const userCountEl = el('userCount');

      const canvas = el('board');
      const ctx = canvas.getContext('2d', { alpha: false });

      let boardWidth = 200;
      let boardHeight = 200;
      const pixelSize = 4;
      let cooldownMs = 2000;
      let cooldownUntil = 0;
      let boardData = new Uint8ClampedArray(boardWidth * boardHeight * 4).fill(255);
      let hoverPos = null;

      let userId = Math.random().toString(36).slice(2, 10);
      let room = null;
      let sendPixel;
      let peers = new Map();
      let activePeer = null;
      let isHost = false;
      let currentRoomName = '';

      const palette = [
        '#6D001A', '#BE0039', '#FF4500', '#FFA800', '#FFD635', '#FFF8B8',
        '#00A368', '#00CC78', '#7EED56', '#00756F', '#009EAA', '#00CCC0',
        '#2450A4', '#3690EA', '#51E9F4', '#493AC1', '#6A5CFF', '#94B3FF',
        '#811E9F', '#B44AC0', '#E4ABFF', '#DE107F', '#FF3881', '#FF99AA',
        '#6D482F', '#9C6926', '#FFB470', '#000000', '#515252', '#898D90',
        '#D4D7D9', '#FFFFFF'
      ];

      let selectedColor = palette[2];

      function updateStats() {
        let pixels = 0;
        for (let i = 0; i < boardData.length; i += 4) {
          if (!(boardData[i] === 255 && boardData[i + 1] === 255 && boardData[i + 2] === 255)) pixels++;
        }
        pixelCountEl.textContent = pixels;
        userCountEl.textContent = peers.size;
      }

      function log(line) {
        const t = new Date().toISOString().slice(11, 19);
        const div = document.createElement('div');
        div.textContent = `[${t}] ${line}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(ok, text) {
        statusEl.textContent = text.toUpperCase();
        statusEl.classList.toggle('ok', ok);
        statusEl.classList.toggle('bad', !ok);
      }

      function setSelectedColor(c) {
        selectedColor = c;
        selectedColorEl.textContent = c.toUpperCase();
        colorChipEl.style.background = c;
        for (const btn of paletteEl.querySelectorAll('button[data-color]')) {
          btn.classList.toggle('selected', btn.dataset.color === c);
        }
      }

      function renderPalette() {
        paletteEl.innerHTML = '';
        for (const c of palette) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'swatch';
          btn.style.background = c;
          btn.dataset.color = c;
          btn.title = c;
          btn.addEventListener('click', () => setSelectedColor(c));
          paletteEl.appendChild(btn);
        }
        setSelectedColor(selectedColor);
      }

      function resizeCanvasToBoard() {
        canvas.width = boardWidth * pixelSize;
        canvas.height = boardHeight * pixelSize;
        ctx.imageSmoothingEnabled = false;
        renderBoard();
      }

      function renderBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e7e7e7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < boardHeight; y++) {
          for (let x = 0; x < boardWidth; x++) {
            const idx = (y * boardWidth + x) * 4;
            const r = boardData[idx];
            const g = boardData[idx + 1];
            const b = boardData[idx + 2];
            if (r === 255 && g === 255 && b === 255) continue;
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
          }
        }

        if (hoverPos) {
          ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
          ctx.lineWidth = 1;
          ctx.strokeRect(hoverPos.x * pixelSize + 0.5, hoverPos.y * pixelSize + 0.5, pixelSize - 1, pixelSize - 1);
        }

        updateStats();
      }

      function drawPixel(x, y, color) {
        const idx = (y * boardWidth + x) * 4;
        const rgb = hexToRgb(color);
        if (rgb) {
          boardData[idx] = rgb.r;
          boardData[idx + 1] = rgb.g;
          boardData[idx + 2] = rgb.b;
          boardData[idx + 3] = 255;
          renderBoard();
        }
      }

      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
          r: parseInt(result[1], 16),
          g: parseInt(result[2], 16),
          b: parseInt(result[3], 16)
        } : null;
      }

      function getBoardPos(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / pixelSize);
        const y = Math.floor((e.clientY - rect.top) / pixelSize);
        return {
          x: Math.max(0, Math.min(boardWidth - 1, x)),
          y: Math.max(0, Math.min(boardHeight - 1, y))
        };
      }

      resizeCanvasToBoard();
      renderPalette();
      userIdEl.textContent = userId;
      updateStats();

      canvas.addEventListener('mousemove', (e) => {
        hoverPos = getBoardPos(e);
        renderBoard();
      });

      canvas.addEventListener('mouseleave', () => {
        hoverPos = null;
        renderBoard();
      });

      canvas.addEventListener('click', async (e) => {
        if (!room) {
          log('Join a room first!');
          return;
        }

        const now = Date.now();
        if (now < cooldownUntil) {
          const remaining = Math.ceil((cooldownUntil - now) / 1000);
          log(`Wait ${remaining}s before placing`);
          return;
        }

        const { x, y } = getBoardPos(e);
        drawPixel(x, y, selectedColor);
        cooldownUntil = now + cooldownMs;

        if (sendPixel) {
          sendPixel({ x, y, color: selectedColor, user: userId });
        }
      });

      randomBtn.addEventListener('click', () => {
        const c = palette[Math.floor(Math.random() * palette.length)];
        setSelectedColor(c);
      });

      function resetConnectionState(statusText = 'OFFLINE') {
        room = null;
        peers.forEach((conn) => {
          try { conn.close(); } catch {}
        });
        peers.clear();
        if (activePeer && !activePeer.destroyed) {
          try { activePeer.destroy(); } catch {}
        }
        activePeer = null;
        isHost = false;
        currentRoomName = '';
        setStatus(false, statusText);
        joinBtn.disabled = false;
        joinBtn.textContent = 'JOIN';
        updateStats();
      }

      function serializeBoard() {
        const pixels = [];
        for (let y = 0; y < boardHeight; y++) {
          for (let x = 0; x < boardWidth; x++) {
            const idx = (y * boardWidth + x) * 4;
            const r = boardData[idx];
            const g = boardData[idx + 1];
            const b = boardData[idx + 2];
            if (r === 255 && g === 255 && b === 255) continue;
            pixels.push({ x, y, color: '#' + [r, g, b].map((v) => v.toString(16).padStart(2, '0')).join('') });
          }
        }
        return pixels;
      }

      function applyBoardSnapshot(pixels) {
        boardData.fill(255);
        for (const pixel of pixels || []) {
          const idx = (pixel.y * boardWidth + pixel.x) * 4;
          const rgb = hexToRgb(pixel.color);
          if (!rgb) continue;
          boardData[idx] = rgb.r;
          boardData[idx + 1] = rgb.g;
          boardData[idx + 2] = rgb.b;
          boardData[idx + 3] = 255;
        }
        renderBoard();
      }

      function setupConnection(conn) {
        conn.on('open', () => {
          const peerDisplay = conn.peer.replace('pixelplace-', '');
          log(`Connected to: ${peerDisplay}`);
          peers.set(conn.peer, conn);
          room = currentRoomName || true;
          setStatus(true, 'CONNECTED');
          joinBtn.disabled = false;
          joinBtn.textContent = isHost ? 'HOSTING' : 'JOINED';

          if (isHost) {
            conn.send({ type: 'board-sync', pixels: serializeBoard() });
          }
          updateStats();
        });

        conn.on('data', (data) => {
          if (!data || typeof data !== 'object') return;

          if (data.type === 'pixel' && data.user !== userId) {
            drawPixel(data.x, data.y, data.color);
            if (isHost) {
              peers.forEach((peerConn, peerId) => {
                if (peerId !== conn.peer && peerConn.open) peerConn.send(data);
              });
            }
          }

          if (data.type === 'board-sync' && Array.isArray(data.pixels)) {
            applyBoardSnapshot(data.pixels);
            log(`Loaded ${data.pixels.length} pixels from room`);
          }
        });

        conn.on('close', () => {
          log(`Disconnected: ${conn.peer.replace('pixelplace-', '')}`);
          peers.delete(conn.peer);
          if (!isHost && peers.size === 0) resetConnectionState('OFFLINE');
          updateStats();
        });

        conn.on('error', (err) => {
          log('Connection error: ' + (err?.message || err));
          peers.delete(conn.peer);
          if (!isHost) resetConnectionState('FAILED');
          updateStats();
        });
      }

      joinBtn.addEventListener('click', async () => {
        const roomName = roomNameInput.value.trim();
        if (!roomName) {
          log('Please enter a room name');
          return;
        }

        if (activePeer || room) {
          resetConnectionState('OFFLINE');
        }

        joinBtn.disabled = true;
        joinBtn.textContent = '...';
        setStatus(false, 'CONNECTING');
        currentRoomName = roomName;

        try {
          const PeerJS = await import('https://cdn.jsdelivr.net/npm/peerjs@1.5.4/+esm');
          const Peer = PeerJS.default || PeerJS.Peer;

          const peerId = 'pixelplace-' + roomName;
          const peer = new Peer(peerId, { debug: 1 });
          activePeer = peer;

          peer.on('open', () => {
            isHost = true;
            log('Connected to signaling server as room host');
            setStatus(false, 'WAITING');
            joinBtn.disabled = false;
            joinBtn.textContent = 'HOSTING';
            room = roomName;

            peer.on('connection', (conn) => {
              setupConnection(conn);
            });

            log('Waiting for others...');
            updateStats();
          });

          peer.on('error', (err) => {
            log('Peer error: ' + err.type);

            if (err.type === 'unavailable-id') {
              isHost = false;
              try { peer.destroy(); } catch {}
              const newPeer = new Peer(null, { debug: 1 });
              activePeer = newPeer;
              log('Host exists, connecting...');

              newPeer.on('open', () => {
                log('Connected to signaling server as guest');
                const conn = newPeer.connect(peerId, { reliable: true });
                setupConnection(conn);
              });

              newPeer.on('error', (guestErr) => {
                log('Guest peer error: ' + guestErr.type);
                resetConnectionState('FAILED');
              });
            } else {
              resetConnectionState('FAILED');
            }
          });

          peer.on('disconnected', () => {
            log('Lost signaling server connection');
            if (!isHost) resetConnectionState('OFFLINE');
          });

          peer.on('close', () => {
            log('Peer closed');
            if (!isHost) resetConnectionState('OFFLINE');
          });

          sendPixel = (data) => {
            const msg = { type: 'pixel', x: data.x, y: data.y, color: data.color, user: userId };
            peers.forEach((conn) => {
              if (conn.open) conn.send(msg);
            });
          };

        } catch (err) {
          log('Connection failed: ' + err.message);
          resetConnectionState('FAILED');
        }
      });

      setInterval(() => {
        const remaining = Math.max(0, cooldownUntil - Date.now());
        cooldownEl.textContent = (remaining / 1000).toFixed(1) + 's';
      }, 100);
    </script>
  </body>
</html>
